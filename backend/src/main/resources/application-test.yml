spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none   # 🔥 redis kapat

jwt:
  secret: testsecret
  expiration: 3600000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false