spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3305/talent_world
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30 dakika (milisaniye)
      cache-null-values: false
      key-prefix: "talentworld:"
      use-key-prefix: true
      

logging:
  level:
    root: info
    org:
      springframework:
        security: warn
      hibernate: error
    com:
      TalentWorld:
        backend:
          controller: info
          service: debug
          repository: off
  file:
    name: logs/app.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/app.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

management:
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 3600000

server:
  port: 8081